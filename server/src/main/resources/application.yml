# ======= JFRAME AUTOCONFIGURATION =======
jframe:
  application:
    name: APPLICATION_NAME
    group: APPLICATION_GROUP
    version: APPLICATION_VERSION
    environment: ${APPLICATION_ENVIRONMENT:dev}
    url: ${APPLICATION_URL:http://localhost:5173}

  logging:
    disabled: ${LOGGING_DISABLED:false}
    response-length: ${LOGGING_RESPONSE_LENGTH:-1}

  otlp:
    disabled: ${OTLP_DISABLED:true}
    url: ${OTLP_URL:http://localhost:4318}
    timeout: ${OTLP_TIMEOUT:10s}
    sampling-rate: ${OTLP_SAMPLING_RATE:1.0}
    exporter: otlp

# ======= EMAIL CONFIGURATION =======
email:
  host: ${EMAIL_HOST:localhost}
  port: ${EMAIL_PORT:2500}
  address: ${EMAIL_ADDRESS:no-reply@localhost}
  username: ${EMAIL_USERNAME:no-login@localhost.com}
  password: ${EMAIL_PASSWORD:password}
  protocol: smtp
  encoding: UTF-8

# ======= SECURITY CONFIGURATION =======
security:
  bootstrap:
    email: ${GLOBAL_ADMIN_EMAIL:johndoe@example.com}
    password: ${GLOBAL_ADMIN_PASSWORD:admin123!}
    first-name: ${GLOBAL_ADMIN_FIRST_NAME:John}
    last-name: ${GLOBAL_ADMIN_LAST_NAME:Doe}
  access-token:
    lifetime: ${JWT_LIFETIME_SECONDS:15}
    time-unit: ${JWT_LIFETIME_TIME_UNIT:MINUTES}
  refresh-token:
    lifetime: ${JWT_REFRESH_LIFETIME_SECONDS:7}
    time-unit: ${JWT_REFRESH_LIFETIME_TIME_UNIT:DAYS}
  rsa:
    seed: ${RSA_SEED:default-seed}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ======= MANAGEMENT ENDPOINTS =======
management:
  endpoints:
    web:
      exposure.include: health,info,metrics
      base-path: /v1/public/actuator

# ====== SERVER CONFIG ======
server:
  servlet.context-path: /api
  forward-headers-strategy: framework

# ======= SPRINGDOC CONFIGURATION <https://springdoc.org/> =======
springdoc:
  show-actuator: true
  pre-loading-enabled: true
  show-login-endpoint: true
  enable-data-rest: false
  enable-hateoas: false
  swagger-ui:
    disable-swagger-default-url: true
    default-models-expand-depth: -1
    path: /v1/public/docs/openapi.html
  api-docs:
    enabled: false
    path: /v1/public/docs

# ======= SPRING CONFIGURATION =======
spring:
  profiles.active: ${SPRING_PROFILES_ACTIVE:dev,console}
  main:
    banner-mode: off
    allow-bean-definition-overriding: true
    allow-circular-references: true

  threads:
    virtual.enabled: true

  liquibase:
    enabled: false

  datasource:
    hikari:
      poolName: ${DATASOURCE_HIKARI_POOL_NAME:tst_eventify}
      minimumIdle: ${DATASOURCE_HIKARI_MINIMUM_IDLE:5}
      maximumPoolSize: ${DATASOURCE_HIKARI_MAX_POOL_SIZE:17}
      maxLifetime: ${DATASOURCE_HIKARI_MAX_LIFETIME:1800000}
      connectionTimeout: ${DATASOURCE_HIKARI_CONNECTION_TIMEOUT:1000}
      validationTimeout: ${DATASOURCE_HIKARI_VALIDATION_TIMEOUT:5000}
      idleTimeout: ${DATASOURCE_HIKARI_IDLE_TIMEOUT:900000}
      keepaliveTime: ${DATASOURCE_HIKARI_KEEPALIVE_TIME:0}
      registerMbeans: ${DATASOURCE_HIKARI_REGISTER_MBEANS:true}
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/tst_eventify}
    username: ${DATASOURCE_USERNAME:tst_eventify}
    password: ${DATASOURCE_PASSWORD:tst_eventify}
    driverClassName: org.postgresql.Driver

  jpa:
    open-in-view: false
    properties:
      hibernate:
        id.optimizer.pooled.preferred: pooled-lo
        physical_naming_strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
        order_inserts: true
        order_updates: true
        jdbc:
          batch_size: 1000

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${OAUTH2_GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${OAUTH2_GOOGLE_CLIENT_SECRET:your-google-client-secret}
            scope:
              - email
              - profile
          github:
            client-id: ${OAUTH2_GITHUB_CLIENT_ID:your-github-client-id}
            client-secret: ${OAUTH2_GITHUB_CLIENT_SECRET:your-github-client-secret}
            scope:
              - user:email
              - read:user
