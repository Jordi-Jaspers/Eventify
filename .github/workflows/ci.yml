name: CI
on:
  push:
    branches:
      - '**'
    tags:
      - '*.*.*'
  pull_request:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  checks: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_SERVER: ${{ github.repository_owner }}/eventify-server
  IMAGE_NAME_CLIENT: ${{ github.repository_owner }}/eventify-client

jobs:
  # =============================================================================
  # BUILD & TEST
  # =============================================================================
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Read Java version
        id: java-version
        run: |
          version=$(grep '^java' mise.toml | sed 's/.*temurin-\([0-9.]*\).*/\1/')
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "Java version: $version"

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ steps.java-version.outputs.version }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false

      - name: Build Server
        working-directory: ./server
        run: |
          echo "=== Starting clean build ==="
          echo "Branch: ${GITHUB_REF#refs/heads/}"
          echo "Commit: ${GITHUB_SHA::7}"
          ./gradlew clean build
          echo "=== Build completed successfully ==="

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: server/build/test-results/**/*.xml
          check_name: Test Results
          comment_mode: off

      - name: Upload server build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: server-build
          path: server/build/libs/*.jar
          retention-days: 1

      - name: Read Bun version
        id: bun-version
        run: |
          version=$(grep '^bun' mise.toml | sed 's/.*"\([0-9.]*\)".*/\1/')
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "Bun version: $version"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ steps.bun-version.outputs.version }}

      - name: Install frontend dependencies
        working-directory: ./client
        run: bun install

      - name: Run type checks
        working-directory: ./client
        run: bun run check

      - name: Build frontend
        working-directory: ./client
        run: bun run build

  # =============================================================================
  # DOCKER BUILD & PUSH - SERVER (develop only)
  # =============================================================================
  docker-server:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v6

      - name: Download server build artifacts
        uses: actions/download-artifact@v8
        with:
          name: server-build
          path: server/build/libs

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_SERVER }}
          tags: |
            type=raw,value=latest-dev
            type=sha,prefix=dev-

      - name: Build and push server image
        uses: docker/build-push-action@v7
        with:
          context: ./server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # =============================================================================
  # DOCKER BUILD & PUSH - CLIENT (develop only)
  # =============================================================================
  docker-client:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_CLIENT }}
          tags: |
            type=raw,value=latest-dev
            type=sha,prefix=dev-

      - name: Build and push client image
        uses: docker/build-push-action@v7
        with:
          context: ./client
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # =============================================================================
  # RELEASE - Docker images with version tags + Release notes
  # =============================================================================
  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download server build artifacts
        uses: actions/download-artifact@v8
        with:
          name: server-build
          path: server/build/libs

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Build and push server image with version tags ---
      - name: Extract server metadata
        id: meta-server
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_SERVER }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push server image
        uses: docker/build-push-action@v7
        with:
          context: ./server
          push: true
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      # --- Build and push client image with version tags ---
      - name: Extract client metadata
        id: meta-client
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_CLIENT }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push client image
        uses: docker/build-push-action@v7
        with:
          context: ./client
          push: true
          tags: ${{ steps.meta-client.outputs.tags }}
          labels: ${{ steps.meta-client.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      # --- Generate release notes and create GitHub release ---
      - name: Get previous tag
        id: prev-tag
        run: |
          git fetch --tags --force
          CURRENT_TAG=${GITHUB_REF#refs/tags/}
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 "$CURRENT_TAG^" 2>/dev/null || echo "")
          echo "current=$CURRENT_TAG" >> $GITHUB_OUTPUT
          echo "previous=$PREVIOUS_TAG" >> $GITHUB_OUTPUT
          echo "Current tag: $CURRENT_TAG"
          echo "Previous tag: $PREVIOUS_TAG"

      - name: Generate changelog
        id: changelog
        uses: requarks/changelog-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fromTag: ${{ steps.prev-tag.outputs.current }}
          toTag: ${{ steps.prev-tag.outputs.previous }}
          writeToFile: false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ${{ steps.changelog.outputs.changes }}

            ## Docker Images

            - `${{ env.REGISTRY }}/${{ env.IMAGE_NAME_SERVER }}:${{ steps.prev-tag.outputs.current }}`
            - `${{ env.REGISTRY }}/${{ env.IMAGE_NAME_CLIENT }}:${{ steps.prev-tag.outputs.current }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
