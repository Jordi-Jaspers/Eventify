name: CI
on:
  push:
    branches:
      - master
      - develop
    tags:
      - '*.*.*'
  pull_request:
    branches:
      - master
      - develop
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_SERVER: ${{ github.repository_owner }}/eventify-server
  IMAGE_NAME_CLIENT: ${{ github.repository_owner }}/eventify-client

jobs:
  # =============================================================================
  # BUILD & TEST
  # =============================================================================
  build:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') == false

    steps:
      - uses: actions/checkout@v4

      - name: Read Java version
        id: java-version
        run: |
          version=$(grep "^java" .tool-versions | awk '{print $2}' | sed 's/temurin-//')
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "Java version: $version"

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ steps.java-version.outputs.version }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Build Server
        working-directory: ./server
        run: |
          echo "=== Starting clean build ==="
          echo "Branch: ${GITHUB_REF#refs/heads/}"
          echo "Commit: ${GITHUB_SHA::7}"
          ./gradlew clean build
          echo "=== Build completed successfully ==="

      - name: Upload server build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: server-build
          path: server/build/libs/*.jar
          retention-days: 1

      - name: Read Bun version
        id: bun-version
        run: |
          version=$(grep "^bun" .tool-versions | awk '{print $2}')
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "Bun version: $version"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ steps.bun-version.outputs.version }}

      - name: Install frontend dependencies
        working-directory: ./client
        run: bun install

      - name: Run type checks
        working-directory: ./client
        run: bun run check

      - name: Build frontend
        working-directory: ./client
        run: bun run build

  # =============================================================================
  # DOCKER BUILD & PUSH - SERVER
  # =============================================================================
  docker-server:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/'))

    steps:
      - uses: actions/checkout@v4

      - name: Download server build artifacts
        uses: actions/download-artifact@v4
        with:
          name: server-build
          path: server/build/libs

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_SERVER }}
          tags: |
            # For develop branch: latest-dev and dev-<sha>
            type=raw,value=latest-dev,enable=${{ github.ref == 'refs/heads/develop' }}
            type=sha,prefix=dev-,enable=${{ github.ref == 'refs/heads/develop' }}
            # For tags: version and latest
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # =============================================================================
  # DOCKER BUILD & PUSH - CLIENT
  # =============================================================================
  docker-client:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/'))

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_CLIENT }}
          tags: |
            # For develop branch: latest-dev and dev-<sha>
            type=raw,value=latest-dev,enable=${{ github.ref == 'refs/heads/develop' }}
            type=sha,prefix=dev-,enable=${{ github.ref == 'refs/heads/develop' }}
            # For tags: version and latest
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
